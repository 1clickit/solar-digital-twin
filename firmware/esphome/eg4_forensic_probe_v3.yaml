substitutions:
  device_name: eg4-forensic-logger
  friendly_name: EG4 Forensic Probe v3

  # PZEM measures ONE 120V leg at the EG4 GEN / AC-coupling connector.
  # Total split-phase power and energy are estimated as L1 x 2.
  # Calibrated from your observed full production: ~4300W / 6 micros = ~717W/micro.
  estimated_micro_watts: "717.0"
  total_micros: "6.0"

  # Event thresholds
  power_step_watts: "800.0"      # Estimated total AC-coupled W change per second
  freq_step_hz: "0.08"           # Hz change per second
  voltage_step_volts: "0.75"     # Estimated L1-L2 V change per second
  high_frequency_hz: "62.00"
  low_frequency_hz: "59.00"
  min_event_gap_ms: "5000"       # Prevents log spam during one continuing event

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Independent EG4 GEN L1 forensic probe. PZEM measures one leg; total power and energy are estimated x2."

esp32:
  board: esp32dev
  framework:
    type: arduino

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.3.13
    gateway: 192.168.3.1
    subnet: 255.255.255.0

captive_portal:

time:
  - platform: sntp
    id: esptime
    timezone: America/Chicago
    servers:
      - 192.168.3.11

web_server:
  port: 80

# Quiet by default. Use the Capture Verbose Console Logs switch to temporarily show every sensor update.
logger:
  level: WARN
  baud_rate: 0

uart:
  - id: uart_1
    tx_pin: GPIO17
    rx_pin: GPIO16
    baud_rate: 9600
    stop_bits: 1

modbus:
  - id: modbus_1
    uart_id: uart_1
    send_wait_time: 250ms

globals:
  - id: event_log
    type: std::string
    restore_value: no
    initial_value: '"Waiting for events..."'

  - id: current_status_text
    type: std::string
    restore_value: no
    initial_value: '"BOOTING: Waiting for valid PZEM measurements..."'

  - id: event_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: power_event_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: frequency_event_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: voltage_event_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: prev_est_power
    type: float
    restore_value: no
    initial_value: 'NAN'

  - id: prev_est_voltage
    type: float
    restore_value: no
    initial_value: 'NAN'

  - id: prev_freq
    type: float
    restore_value: no
    initial_value: 'NAN'

  - id: power_ramp_value
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: frequency_ramp_value
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: voltage_ramp_value
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: largest_power_drop
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: last_event_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

switch:
  - platform: template
    name: "00 Event Detection Enabled"
    id: event_detection_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "00 Capture Verbose Console Logs"
    id: capture_verbose_logs
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - logger.set_level: DEBUG
    on_turn_off:
      - logger.set_level: WARN

button:
  - platform: template
    name: "00 Clear Forensic Log and Stats"
    id: clear_log_btn
    on_press:
      - lambda: |-
          id(event_log) = "Waiting for events...";
          id(current_status_text) = "RESET: Waiting for next event.";
          id(event_count) = 0;
          id(power_event_count) = 0;
          id(frequency_event_count) = 0;
          id(voltage_event_count) = 0;
          id(largest_power_drop) = 0.0;
          id(last_event_ms) = 0;

sensor:
  # ------------------------------------------------
  # RAW PHYSICAL MEASUREMENTS - kept internal so the web page stays readable.
  # PZEM is installed on EG4 GEN/AC-coupling connector, L1 only.
  # ------------------------------------------------
  - platform: pzemac
    address: 1
    modbus_id: modbus_1
    update_interval: 1s

    voltage:
      name: "99 Raw GEN L1-N Voltage"
      id: raw_gen_l1_voltage
      internal: true
      accuracy_decimals: 1
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement

    current:
      name: "99 Raw GEN L1 Current"
      id: raw_gen_l1_current
      internal: true
      accuracy_decimals: 2
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement

    power:
      name: "99 Raw GEN L1 Power"
      id: raw_gen_l1_power
      internal: true
      accuracy_decimals: 1
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    energy:
      name: "99 Raw GEN L1 Energy"
      id: raw_gen_l1_energy
      internal: true
      accuracy_decimals: 1
      unit_of_measurement: "Wh"
      device_class: energy
      state_class: total_increasing

    frequency:
      name: "99 Raw GEN Frequency"
      id: raw_gen_frequency
      internal: true
      accuracy_decimals: 2
      unit_of_measurement: "Hz"
      device_class: frequency
      state_class: measurement

    power_factor:
      name: "99 Raw GEN L1 Power Factor"
      id: raw_gen_l1_pf
      internal: true
      accuracy_decimals: 2
      state_class: measurement

  # ------------------------------------------------
  # PUBLIC / WEB VIEW - small set of values worth watching live.
  # ------------------------------------------------
  - platform: template
    name: "01 Estimated Total AC-Coupled Power"
    id: est_total_ac_power
    lambda: |-
      if (isnan(id(raw_gen_l1_power).state)) return NAN;
      return id(raw_gen_l1_power).state * 2.0;
    accuracy_decimals: 0
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    update_interval: 1s

  - platform: template
    name: "01 Estimated Active Microinverters"
    id: est_active_micros
    lambda: |-
      if (isnan(id(est_total_ac_power).state)) return NAN;
      float micros = id(est_total_ac_power).state / ${estimated_micro_watts};
      if (micros < 0.0) micros = 0.0;
      if (micros > ${total_micros}) micros = ${total_micros};
      return micros;
    accuracy_decimals: 1
    update_interval: 1s

  - platform: template
    name: "01 Estimated Curtailment Percent"
    id: est_curtailment_percent
    lambda: |-
      if (isnan(id(est_total_ac_power).state)) return NAN;
      float full_power = ${estimated_micro_watts} * ${total_micros};
      float pct = (1.0 - (id(est_total_ac_power).state / full_power)) * 100.0;
      if (pct < 0.0) pct = 0.0;
      if (pct > 100.0) pct = 100.0;
      return pct;
    accuracy_decimals: 0
    unit_of_measurement: "%"
    state_class: measurement
    update_interval: 1s

  - platform: template
    name: "01 GEN Frequency"
    id: gen_frequency_display
    lambda: |-
      if (isnan(id(raw_gen_frequency).state)) return NAN;
      return id(raw_gen_frequency).state;
    accuracy_decimals: 2
    unit_of_measurement: "Hz"
    device_class: frequency
    state_class: measurement
    update_interval: 1s

  - platform: template
    name: "01 GEN L1 Current"
    id: gen_l1_current_display
    lambda: |-
      if (isnan(id(raw_gen_l1_current).state)) return NAN;
      return id(raw_gen_l1_current).state;
    accuracy_decimals: 2
    unit_of_measurement: "A"
    device_class: current
    state_class: measurement
    update_interval: 1s

  - platform: template
    name: "01 Estimated GEN L1-L2 Voltage"
    id: est_gen_l1_l2_voltage
    lambda: |-
      if (isnan(id(raw_gen_l1_voltage).state)) return NAN;
      return id(raw_gen_l1_voltage).state * 2.0;
    accuracy_decimals: 1
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    update_interval: 1s

  - platform: template
    name: "01 Estimated Total AC-Coupled Energy"
    id: est_total_ac_energy
    lambda: |-
      if (isnan(id(raw_gen_l1_energy).state)) return NAN;
      return id(raw_gen_l1_energy).state * 2.0;
    accuracy_decimals: 0
    unit_of_measurement: "Wh"
    device_class: energy
    state_class: total_increasing
    update_interval: 10s

  # ------------------------------------------------
  # FORENSIC RATES / STATS - visible but compact.
  # ------------------------------------------------
  - platform: template
    name: "02 Power Ramp Rate"
    id: power_ramp_rate_display
    lambda: |-
      return id(power_ramp_value);
    accuracy_decimals: 0
    unit_of_measurement: "W/s"
    state_class: measurement
    update_interval: 1s

  - platform: template
    name: "02 Frequency Ramp Rate"
    id: frequency_ramp_rate_display
    lambda: |-
      return id(frequency_ramp_value);
    accuracy_decimals: 3
    unit_of_measurement: "Hz/s"
    state_class: measurement
    update_interval: 1s

  - platform: template
    name: "02 Largest Power Drop Since Reset"
    id: largest_power_drop_display
    lambda: |-
      return id(largest_power_drop);
    accuracy_decimals: 0
    unit_of_measurement: "W/s"
    state_class: measurement
    update_interval: 5s

  - platform: template
    name: "02 Total Events Since Reset"
    id: event_count_display
    lambda: |-
      return id(event_count);
    accuracy_decimals: 0
    update_interval: 5s

binary_sensor:
  - platform: template
    name: "03 GEN Frequency High"
    lambda: |-
      if (isnan(id(raw_gen_frequency).state)) return false;
      return id(raw_gen_frequency).state > ${high_frequency_hz};

  - platform: template
    name: "03 GEN Frequency Low"
    lambda: |-
      if (isnan(id(raw_gen_frequency).state)) return false;
      return id(raw_gen_frequency).state < ${low_frequency_hz};

  - platform: template
    name: "03 Large Power Drop Active"
    lambda: |-
      return id(power_ramp_value) < -${power_step_watts};

  - platform: template
    name: "03 Large Power Rise Active"
    lambda: |-
      return id(power_ramp_value) > ${power_step_watts};

text_sensor:
  - platform: template
    name: "00 Probe Measurement Point"
    lambda: |-
      return std::string("EG4 GEN/AC-coupling connector, L1 only. Power/energy estimated x2 for balanced 240V.");
    update_interval: 60s

  - platform: template
    name: "00 Current Status"
    id: current_status_display
    update_interval: 1s
    lambda: |-
      return id(current_status_text);

  - platform: template
    name: "04 Forensic Event Log"
    id: forensic_display
    update_interval: 2s
    lambda: |-
      return id(event_log);

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (isnan(id(est_total_ac_power).state) || isnan(id(est_gen_l1_l2_voltage).state) || isnan(id(raw_gen_frequency).state)) {
            id(current_status_text) = "WAITING: PZEM measurements not valid yet.";
            return;
          }

          const float power_now = id(est_total_ac_power).state;
          const float voltage_now = id(est_gen_l1_l2_voltage).state;
          const float freq_now = id(raw_gen_frequency).state;
          const float micros_now = id(est_active_micros).state;

          if (isnan(id(prev_est_power)) || isnan(id(prev_est_voltage)) || isnan(id(prev_freq))) {
            id(prev_est_power) = power_now;
            id(prev_est_voltage) = voltage_now;
            id(prev_freq) = freq_now;
            char init_msg[220];
            snprintf(init_msg, sizeof(init_msg), "NORMAL: Initialized. Power %.0fW, micros %.1f, freq %.2fHz.", power_now, micros_now, freq_now);
            id(current_status_text) = std::string(init_msg);
            return;
          }

          const float d_power = power_now - id(prev_est_power);
          const float d_voltage = voltage_now - id(prev_est_voltage);
          const float d_freq = freq_now - id(prev_freq);

          id(power_ramp_value) = d_power;
          id(voltage_ramp_value) = d_voltage;
          id(frequency_ramp_value) = d_freq;

          id(prev_est_power) = power_now;
          id(prev_est_voltage) = voltage_now;
          id(prev_freq) = freq_now;

          bool event = false;
          bool power_event = false;
          bool freq_event = false;
          bool voltage_event = false;
          char event_name[48];
          snprintf(event_name, sizeof(event_name), "NORMAL");

          if (d_power <= -${power_step_watts}) {
            event = true;
            power_event = true;
            snprintf(event_name, sizeof(event_name), "POWER_DROP");
            if (d_power < id(largest_power_drop)) id(largest_power_drop) = d_power;
          } else if (d_power >= ${power_step_watts}) {
            event = true;
            power_event = true;
            snprintf(event_name, sizeof(event_name), "POWER_RISE");
          }

          if (fabsf(d_freq) >= ${freq_step_hz} || freq_now >= ${high_frequency_hz} || freq_now <= ${low_frequency_hz}) {
            event = true;
            freq_event = true;
            if (freq_now >= ${high_frequency_hz}) snprintf(event_name, sizeof(event_name), "HIGH_FREQ");
            else if (freq_now <= ${low_frequency_hz}) snprintf(event_name, sizeof(event_name), "LOW_FREQ");
            else if (d_freq > 0) snprintf(event_name, sizeof(event_name), "FREQ_RISE");
            else snprintf(event_name, sizeof(event_name), "FREQ_DROP");
          }

          if (fabsf(d_voltage) >= ${voltage_step_volts}) {
            event = true;
            voltage_event = true;
            if (!freq_event && !power_event) {
              if (d_voltage > 0) snprintf(event_name, sizeof(event_name), "VOLT_RISE");
              else snprintf(event_name, sizeof(event_name), "VOLT_DROP");
            }
          }

          char status_msg[260];
          if (event) {
            snprintf(status_msg, sizeof(status_msg), "EVENT %s: P %.0fW (%+.0fW/s), micros %.1f, F %.2fHz (%+.3fHz/s), V %.1fV (%+.2fV/s).", event_name, power_now, d_power, micros_now, freq_now, d_freq, voltage_now, d_voltage);
            id(current_status_text) = std::string(status_msg);
          } else {
            snprintf(status_msg, sizeof(status_msg), "NORMAL: Power %.0fW, micros %.1f, curtail %.0f%%, freq %.2fHz, V %.1fV.", power_now, micros_now, id(est_curtailment_percent).state, freq_now, voltage_now);
            id(current_status_text) = std::string(status_msg);
          }

          if (!event || !id(event_detection_enabled).state) return;

          uint32_t now_ms = millis();
          if (id(last_event_ms) != 0 && (now_ms - id(last_event_ms)) < ${min_event_gap_ms}) return;
          id(last_event_ms) = now_ms;

          auto time = id(esptime).now();
          char time_buff[24];
          if (time.is_valid()) time.strftime(time_buff, sizeof(time_buff), "%H:%M:%S");
          else snprintf(time_buff, sizeof(time_buff), "NO_TIME");

          if (power_event) id(power_event_count)++;
          if (freq_event) id(frequency_event_count)++;
          if (voltage_event) id(voltage_event_count)++;
          id(event_count)++;

          char line[300];
          snprintf(line, sizeof(line), "%s %s | P %.0fW dP %+.0fW/s | micros %.1f | F %.2fHz dF %+.3f | V %.1f dV %+.2f | ", time_buff, event_name, power_now, d_power, micros_now, freq_now, d_freq, voltage_now, d_voltage);

          if (id(event_count) == 1) id(event_log) = "";
          id(event_log) = std::string(line) + id(event_log);
          if (id(event_log).length() > 1600) id(event_log) = id(event_log).substr(0, 1600);
